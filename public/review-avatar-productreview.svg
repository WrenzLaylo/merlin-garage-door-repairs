<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="ProductReview.com.au">
  <!-- Blue background rounded square -->
  <rect width="96" height="96" rx="20" fill="#003087"/>
  <!-- White PR letters -->
  <text x="48" y="38" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="13" font-weight="900" fill="#fff" letter-spacing="1">PRODUCT</text>
  <text x="48" y="53" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="13" font-weight="900" fill="#fff" letter-spacing="1">REVIEW</text>
  <!-- Gold star row -->
  <text x="48" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFD700">★★★★★</text>
</svg>
